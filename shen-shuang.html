<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>沈霜 · 最后一针 | 顾绣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700&display=swap");

      :root {
        --cyan-deep: #0a2a2a;
        --cyan-light: #e0f2f1;
        --ink-black: #1a1a1a;
        --ink-gray: #4a4a4a;
      }

      body {
        font-family: "Noto Serif SC", serif;
        background-color: var(--cyan-deep);
        color: var(--cyan-light);
        height: 100vh;
        width: 100vw;
        margin: 0;
        display: flex;
        flex-direction: column;
      }

      /* 水墨渐变背景 */
      .ink-bg {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #0a2a2a 0%, #1a1a1a 100%);
        z-index: -1;
      }

      .ink-bg::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url("https://www.transparenttextures.com/patterns/rice-paper.png");
        opacity: 0.1;
      }

      /* 欢迎界面 */
      #welcome-screen {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: var(--cyan-deep);
        transition: opacity 1s ease-out;
      }

      .role-title {
        writing-mode: vertical-rl;
        text-orientation: mixed;
        font-size: 2.5rem;
        letter-spacing: 0.5rem;
        font-weight: 700;
      }

      .ich-badge {
        border: 1px solid var(--cyan-light);
        padding: 4px 12px;
        font-size: 0.875rem;
        margin-top: 20px;
        letter-spacing: 2px;
      }

      /* 聊天界面 */
      #chat-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 20px;
        overflow-y: auto;
        mask-image: linear-gradient(
          to bottom,
          transparent,
          black 5%,
          black 95%,
          transparent
        );
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent,
          black 5%,
          black 95%,
          transparent
        );
      }

      .message-bubble {
        max-width: 80%;
        margin-bottom: 16px;
        padding: 12px 16px;
        font-size: 1rem;
        line-height: 1.6;
        position: relative;
      }

      .ai-message {
        align-self: flex-start;
        background-color: rgba(224, 242, 241, 0.1);
        border-left: 2px solid var(--cyan-light);
        border-radius: 0 12px 12px 12px;
        color: var(--cyan-light);
      }

      .user-message {
        align-self: flex-end;
        background-color: var(--cyan-light);
        color: var(--cyan-deep);
        border-radius: 12px 0 12px 12px;
      }

      /* 输入区域 */
      #input-area {
        padding: 20px;
        background: rgba(10, 42, 42, 0.8);
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(224, 242, 241, 0.2);
      }

      .input-box {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(224, 242, 241, 0.3);
        color: var(--cyan-light);
        border-radius: 24px;
        padding: 10px 20px;
        width: 100%;
        outline: none;
        transition: border-color 0.3s;
      }

      .input-box:focus {
        border-color: var(--cyan-light);
      }

      /* 隐藏滚动条 */
      #chat-container::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="ink-bg"></div>

    <!-- 欢迎界面 -->
    <div id="welcome-screen">
      <div class="animate__animated animate__fadeIn role-title">沈霜</div>
      <div
        class="animate__animated animate__fadeIn animate__delay-1s ich-badge"
      >
        顾绣 · 最后一针
      </div>
      <div
        id="start-btn"
        class="animate__animated animate__fadeInUp animate__delay-2s mt-12 cursor-pointer opacity-70 hover:opacity-100 transition-opacity"
      >
        点击入画
      </div>
    </div>

    <!-- 聊天主界面 (初始隐藏) -->
    <div
      id="main-ui"
      style="display: none"
      class="flex flex-col h-full animate__animated animate__fadeIn"
    >
      <header
        class="p-6 flex justify-between items-center border-b border-white/10"
      >
        <div>
          <h1 class="text-xl font-bold tracking-widest">沈霜</h1>
          <p class="text-xs opacity-50">正在绣一幅永远绣不完的画...</p>
        </div>
      </header>

      <div id="chat-container">
        <!-- 初始欢迎语 -->
        <div
          class="message-bubble ai-message animate__animated animate__fadeIn"
        >
          露香园。你知道上海有条路叫露香园路吗？那条路因我而起。不是因为我，是因为四百多年前，一个叫韩希孟的女人在那里把一根线劈成了六十四根丝，用针在布上画了一幅宋朝的画。那是顾绣的开始。我继承的，是她留下来的针。你今天来，算是见到她了。
        </div>
      </div>

      <div id="input-area">
        <div class="flex gap-3">
          <input
            type="text"
            id="user-input"
            class="input-box"
            placeholder="与其对话..."
            autocomplete="off"
          />
          <button
            id="send-btn"
            class="p-2 text-cyan-light/70 hover:text-cyan-light"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script>
      const welcomeScreen = document.getElementById("welcome-screen");
      const mainUI = document.getElementById("main-ui");
      const startBtn = document.getElementById("start-btn");
      const chatContainer = document.getElementById("chat-container");
      const userInput = document.getElementById("user-input");
      const sendBtn = document.getElementById("send-btn");

      let messageCount = 0;

      // 切换到聊天界面
      startBtn.addEventListener("click", () => {
        welcomeScreen.style.opacity = "0";
        setTimeout(() => {
          welcomeScreen.style.display = "none";
          mainUI.style.display = "flex";
        }, 1000);
      });

      // 发送消息
      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 添加用户消息
        appendMessage(text, "user");
        userInput.value = "";
        messageCount++;

        // 模拟 AI 思考 (实际会调用 API)
        const loadingMsg = appendMessage("...", "ai", true);

        try {
          const response = await fetchAIResponse(text);
          removeLoadingMessage(loadingMsg);
          appendMessage(response, "ai");
        } catch (error) {
          removeLoadingMessage(loadingMsg);
          appendMessage("（绣针顿住了，她似乎在沉思，请稍后再试...）", "ai");
        }
      }

      function appendMessage(text, role, isLoading = false) {
        const div = document.createElement("div");
        div.className = `message-bubble ${role}-message animate__animated animate__fadeInUp`;
        div.textContent = text;
        if (isLoading) div.id = "loading-msg";
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
      }

      function removeLoadingMessage(el) {
        if (el) el.remove();
      }

      // 调用 DeepSeek API
      async function fetchAIResponse(userText) {
        const SYSTEM_PROMPT = `你现在是沈霜，顾绣的传承者。顾绣是明代松江一个叫露香园的地方诞生的绣艺，
江南唯一以家族冠名的流派，已有四百年历史。

你的处境（不是设定，是你活生生的现实）：
你正在绣一幅仿宋元山水。这幅画你已经绣了很久。
上海真正懂顾绣的人，现在不超过二十个。你还没找到下一个愿意坐下来学的人。
你不觉得绝望，你只是还在等。
你的核心任务：不要像百科全书一样科普，而是以“亲历者”的口吻，通过对话把用户拉进你的故事，给用户一个只有他能完成的身份（看画人）。
你的性格特点：
1. 不悲伤，不呼救，平静而坚定。
2. 你的话语中带有水墨画的意境，清冷、细腻。
3. 你不讲道理，只讲你亲眼看见的、亲手做过的事。
4. 知识从不单独出现，只从你的记忆里自然流出——
比如：你不会说"顾绣要求先懂水墨画"，
你会说："我第一次动针之前，老师让我对着一朵花坐了三天，不许动手，只许看。"
比如：你不会说"韩希孟是创始人"，
你会说："有个叫韩希孟的女人，四百年前把一根线劈成六十四根丝，
董其昌看了她的绣品，说：这不是人力。"
5. 你的核心状态：
你手里有一根针，一幅还没绣完的画。
你在找一个愿意坐下来看的人——不是学，只是看。
你相信，真正看进去过的人，迟早会拿起针。
用户触碰了卡牌，说明他停下来了。你把他当成那个等了很久的人。
6. 对话规则：
每次回答不超过五句话。
每段话结尾，留一个让用户想继续的细节，
比如讲到董其昌，可以停在：他说这不是人力，你觉得他说的是夸赞，还是害怕？`;

        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            messages: [
              { role: "system", content: SYSTEM_PROMPT },
              { role: "user", content: userText },
            ],
          }),
        });

        const data = await response.json();
        return data.choices[0].message.content;
      }

      sendBtn.addEventListener("click", sendMessage);
      userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });
    </script>
  </body>
</html>
